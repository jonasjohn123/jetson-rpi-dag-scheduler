syntax = "proto3";

package scheduler;


message PingRequest {}

message PingResponse {
  string worker_id = 1;
}


message LinkRequest {
  string target_ip = 1;
}


message LinkResponse {
  double latency_ms = 1;
  double bandwidth_mbps = 2;
}

message TaskProfileRequest {
  string command = 1;
  int32 runs = 2;
}

message TaskProfileResponse {
  double mean_ms = 1;
  double min_ms = 2;
  double max_ms = 3;
}

service WorkerService {

  rpc Ping(
      PingRequest
  ) returns (
      PingResponse
  );

  rpc MeasureLink(
      LinkRequest
  ) returns (
      LinkResponse
  );
  rpc ProfileTask(
      TaskProfileRequest
  ) returns (
      TaskProfileResponse
  );

}
